name: Alpha Proof

# ALPHA-009: the suite alpha proof / public-fixture vertical is the required
# integration guardrail. It replaces the retired literal "Hello World" workflow.
# CI no longer passes because a hello-world success string printed; instead,
# `just alpha-proof` runs the ALPHA-007 public-fixture vertical and the
# independent artifact-linkage validator, which fail unless bridge, patch export,
# PatchResult, provider proof, benchmark report, runtime observation,
# dashboard/read-model ingestion, and the SHARED-025 manifest all share the same
# public fixture id, source revision, locale branch, and content hashes.
#
# The vertical is public-fixture-only and deterministic: no database, no live
# credentials, no private corpora, and no private local paths. There is no
# separate Hello World source of truth.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  alpha-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: sudo snap install just --classic
      - run: just alpha-proof
