name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Points at the `postgres` service container below (host port 55433 ->
      # container 5432). Provisioned by GitHub, not by docker-compose, so the DB
      # is up and health-checked before `just ci` runs its DB-backed tests.
      DATABASE_URL: postgres://itotori:itotori@127.0.0.1:55433/itotori
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: itotori
          POSTGRES_PASSWORD: itotori
          POSTGRES_DB: itotori
        ports:
          - "55433:5432"
        # Wait for Postgres to accept connections before any step runs, so the
        # DB-backed suites execute against a real database (never a green skip).
        options: >-
          --health-cmd "pg_isready -U itotori -d itotori"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: cargo install cargo-deny --locked --version 0.20.2
      - run: sudo snap install just --classic
      - run: just ci
