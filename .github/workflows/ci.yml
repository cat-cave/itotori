name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://itotori:itotori@127.0.0.1:55433/itotori
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Install lockfile-pinned Playwright Chromium
        run: pnpm --filter @itotori/ds exec playwright install chromium
      - name: Export Playwright Chromium for CI consumers
        run: |
          chromium_bin="$(pnpm --filter @itotori/ds exec node --input-type=module -e 'import { chromium } from "@playwright/test"; process.stdout.write(chromium.executablePath())')"
          test -x "$chromium_bin"
          {
            echo "PLAYWRIGHT_CHROMIUM_BIN=$chromium_bin"
            echo "UTSUSHI_BROWSER_BIN=$chromium_bin"
          } >> "$GITHUB_ENV"
      - run: cargo install cargo-deny --locked
      - run: sudo snap install just --classic
      - run: just db-up
      - run: just db-wait
      - run: just ci
      - run: just db-down
        if: always()
