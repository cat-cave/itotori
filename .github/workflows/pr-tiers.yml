# Active required tier dispatcher — gates main via GitHub's native merge queue
# (ruleset main-merge-queue, enforcement active; tier0 + tier1 are the required
# merge-queue checks). ci.yml + alpha-proof.yml are retired/deleted.
name: PR tiers

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Cancel superseded PR runs only; never cancel merge_group / push / dispatch.
  group: pr-tiers-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  tier0:
    uses: ./.github/workflows/_tier0.yml
    secrets: inherit

  tier1:
    uses: ./.github/workflows/_tier1.yml
    secrets: inherit
