<!-- Filled in at runtime; empty in the static source. -->
<script id="utsushi-observed-events" type="application/json"></script>

<script>
(function () {
  "use strict";

  function decodeBase64Utf8(value) {
    var binary = atob(value.trim());
    var bytes = Uint8Array.from(binary, function (ch) {
      return ch.charCodeAt(0);
    });
    return new TextDecoder("utf-8").decode(bytes);
  }

  // Decode the runtime payload. This is the "render": the plaintext only
  // comes into existence here, when a real JS runtime executes the page.
  var srcEl = document.getElementById("utsushi-observed-src");
  var data = JSON.parse(decodeBase64Utf8(srcEl.textContent));
  var events = Array.isArray(data.events) ? data.events : [];

  var messageWindow = document.getElementById("messageWindow");
  var choiceWindow = document.getElementById("choiceWindow");

  // Paint the observed text/choice content into the MV/MZ-style windows so
  // the live DOM genuinely contains what the probe reports.
  events.forEach(function (event) {
    if (event.kind === "text") {
      var line = document.createElement("p");
      line.className = "rmmz-message-line";
      line.setAttribute("data-unit-key", event.unitKey || "");
      if (event.speaker) {
        line.setAttribute("data-speaker", event.speaker);
      }
      line.textContent = event.text;
      messageWindow.appendChild(line);
    } else if (event.kind === "choice") {
      if (event.prompt) {
        choiceWindow.setAttribute("data-prompt", event.prompt);
      }
      (event.options || []).forEach(function (option) {
        var item = document.createElement("li");
        item.className = "rmmz-choice";
        item.setAttribute("data-option-id", option.optionId || "");
        item.setAttribute("data-unit-key", option.unitKey || "");
        item.textContent = option.label;
        choiceWindow.appendChild(item);
      });
    }
  });

  // Publish the machine-readable observation island the trace probe parses
  // out of the live `--dump-dom` output.
  var island = document.getElementById("utsushi-observed-events");
  island.textContent =
    "/*UTSUSHI-OBSERVED-BEGIN*/" +
    JSON.stringify(data) +
    "/*UTSUSHI-OBSERVED-END*/";
})();
</script>
