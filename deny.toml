[advisories]
version = 2
ignore = []

[licenses]
version = 2
# Unicode-3.0 is OSI-approved and is pulled in only through unicode-ident
# in the Rust proc-macro parser stack used by serde derives.
# MIT-0, BSD-3-Clause, and Zlib are permissive and ecosystem-standard.
# MPL-2.0 is weak/file-level copyleft; using `dirs` (which transitively pulls
# `option-ext`) as an unmodified library does not infect downstream code. We
# allow it because the alternative (a custom XDG basedir implementation) is
# not worth the cost; any modification to the MPL'd source would re-introduce
# the policy question.
allow = ["MIT", "Apache-2.0", "Unicode-3.0", "MIT-0", "BSD-3-Clause", "Zlib", "MPL-2.0"]

[bans]
multiple-versions = "deny"
# External `*` version requirements are denied. The only "wildcards" in this
# tree are the version-less internal workspace path deps (e.g.
# `kaifuu-core = { path = "../kaifuu-core" }`), which cargo-deny reports as
# wildcards; `allow-wildcard-paths` exempts ONLY those local path crates and
# keeps the ban fully active for any real external `*` dependency.
wildcards = "deny"
allow-wildcard-paths = true

# All skips below are transitive, upstream-pinned duplicates that cannot be
# aligned from itotori's manifests (they come from third-party crates' own
# version requirements). They are narrow (exact-version) skips, NOT a blanket
# `multiple-versions = "allow"`. Each `[[bans.skip]]` is preceded on the line
# immediately above by a `# reason:` comment (enforced by
# scripts/verify-deny-strict.mjs).

# reason: getrandom 0.2.17 comes ONLY from redox_users (a Redox-OS-target-only transitive dep of `dirs` -> dirs-sys); it never builds on our Linux/macOS targets, and the live graph otherwise resolves a single getrandom 0.4 via uuid — no upstream dedup available.
[[bans.skip]]
name = "getrandom"
version = "=0.2.17"

# reason: getrandom 0.3.4 is pinned by jsonschema 0.46 -> ahash, while uuid and tempfile resolve getrandom 0.4.3; the third-party requirements cannot be aligned from itotori's manifests.
[[bans.skip]]
name = "getrandom"
version = "=0.3.4"

# reason: hashbrown 0.16.1 is pinned by jsonschema 0.46 -> referencing while rusqlite 0.40 -> hashlink pulls hashbrown 0.17; neither is bumpable without an upstream release aligning the two — no dedup available.
[[bans.skip]]
name = "hashbrown"
version = "=0.16.1"

# reason: r-efi 5.3.0 is pinned by getrandom 0.3.4 (jsonschema 0.46), while uuid's getrandom 0.4.3 pins r-efi 6.0.0; both are EFI-target-only transitive requirements with no aligned upstream release.
[[bans.skip]]
name = "r-efi"
version = "=5.3.0"
