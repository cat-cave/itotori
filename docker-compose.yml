services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: itotori
      POSTGRES_PASSWORD: itotori
      POSTGRES_DB: itotori
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itotori -d itotori"]
      interval: 2s
      timeout: 2s
      retries: 30
